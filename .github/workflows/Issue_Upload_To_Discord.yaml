name: Relay Issue to Discord's Issue Channel

on:
  issues:
    types: [opened, closed, deleted, reopened, edited, labeled, locked, unlabeled, unlocked, pinned]

jobs:
  discord-upload:
    environment: discord_upload_env # Change to your exact GitHub environment name
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14' # Dynamically targets Python 3.14 environment

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install discord.py

      - name: Create Python Script Dynamically
        run: |
          cat << 'EOF' > send_discord_alert.py
          import os
          import asyncio
          import discord

          TOKEN = os.getenv("D_BOT_TOKEN")
          CHANNEL_ID = os.getenv("D_ISSUE_CHANNEL_ID")

          # Gather issue details passed from GitHub Action environment
          ISSUE_TITLE = os.getenv("ISSUE_TITLE", "Error 404: Title Not Found")
          ISSUE_USER = os.getenv("ISSUE_USER", "Error 404: User Not Found")
          ISSUE_URL = os.getenv("ISSUE_URL", "Error 404: Issue URL Not Found")
          ISSUE_EVENT_TYPE = os.getenv("ISSUE_EV_TYPE", "PLACEHOLDER")

          intents = discord.Intents.default()
          client = discord.Client(intents=intents)

          @client.event
          async def on_ready():
              print(f"Logged in on Python 3.14")
              channel = client.get_channel(CHANNEL_ID)
              if channel:
                  action = f"{ISSUE_EVENT_TYPE.capitalize()} By:"
                  # Create a stylized Discord Embed
                  embed = discord.Embed(
                      title=f"⚠️ New Issue Opened",
                      description=f"**Title:** {ISSUE_TITLE}",
                      url=ISSUE_URL,
                      color=discord.Color.red()
                  )
                  embed.add_field(name=action, value=ISSUE_USER, inline=True)
                  
                  embed.set_footer(text="This is an Automated Message. [Script Generated by Gemini]")
                  
                  await channel.send(embed=embed)
                  print("Alert sent successfully!")
              else:
                  print("Error: Could not find channel. Verify bot permissions.")
              
              # Safely disconnect so the workflow execution ends cleanly
              await client.close()

          if __name__ == "__main__":
              client.run(TOKEN)
          EOF

      - name: Run Python Script
        env:
          D_BOT_TOKEN: ${{ secrets.D_BOT_TOKEN }}
          D_ISSUE_CHANNEL_ID: ${{ secrets.D_ISSUE_CHANNEL_ID }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_EV_TYPE: ${{ github.event.action }}
        run: python send_discord_alert.py
